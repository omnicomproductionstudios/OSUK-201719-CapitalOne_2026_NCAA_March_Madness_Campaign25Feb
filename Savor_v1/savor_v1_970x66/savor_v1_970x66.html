<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="./css/style.css">
    </head>
    <body>
      <div id="banner" class="bannerSize">
        <!-- content -->
        <ft-default clickaction="expand">
          <!-- <img src="images/1.jpg" style="width: 970px; height: 66px; position: absolute; left: 0px; top: 0px; opacity: .5; z-index: 111;" alt=""> -->
          <div class="defaultBorder defaultSize"></div>
          <div class='capOneLogo'>
            <img src="images/redSwoop.svg" id="redSwoop" alt="" />
            <img src="images/capital.svg" id="capital" alt="Capital" />
            <img src="images/one.svg" id="one" alt="One" />
          </div>  
          

         <div class="basketballCont">
            <div class="basketballBounce">
              <img
                src="images/spring.svg"
                id="basketball"
                alt="basketball"
              />
            </div>
          </div>  

          <div class="mask">
            <div class="shimmer" aria-hidden="true"></div>
            <img
              src="images/copy1.svg"
              id="txt1a"
              alt="The perfect game plan to earn cash back"
            />
          </div>

          <img class="expandBtn" src="images/expand_close_btn.svg" alt="click to expand" />
        
          <div class="ctaCont" id="cta">
            <img src="images/rArrowCollapsed.svg" id="rArrow" alt="arrow point to the right" />
          </div>
        </ft-default>

        <ft-expand customclose>
            <!-- <img src="images/3.jpg" style="width: 970px; height: 250px; position: absolute; left: 0px; top: 0px; opacity: .5; z-index: 111;" alt=""> -->


            <div class='expCapOneLogo'>
              <img src="images/redSwoop.svg" id="redSwoop" alt="" />
              <img src="images/capital.svg" id="capital" alt="Capital" />
              <img src="images/one.svg" id="one" alt="One" />
            </div>

            <div class="expBasketballCont">
              <div class="expBasketballBounce">
                <img
                  src="images/spring.svg"
                  id="exPbasketball"
                  alt="basketball"
                />
              </div>
            </div>  
            
            <div class="exp-mask">
              <div class="exp-shimmer" aria-hidden="true"></div>
              <img
                src="images/copy2.svg"
                id="txt2a"
                alt="When it rains cash back, it pours!"
              />
            </div>
            <img src="images/MarchMadnessLogo.svg" id="marchLogo" alt="">

            <!-- <img src="images/rArrow.svg" id="rArrowExp" alt="Blue arrow pointing right" /> -->

            <div class="clickthrough expandSize" clicktag="1"></div>
            <div class="videoCont">
              <ft-video id="video1" name="video1"></ft-video>
              <ft-video-controls class="vidControls" for="video1"></ft-video-controls>
              <img id="vidPoster" src="images/poster.jpg" alt="video thumbnail image with a white play button in the center." />
            </div>
            <ft-click id="close"clickaction="contract">
              <p><img class="closeBtn" src="images/expand_close_btn.svg" alt="click to expand" /></p>
            </ft-click>
            <div class="defaultBorder expandSize"></div>
        </ft-expand>
        <div id="cover" class="defaultSize"></div>
        <!-- scripts -->
        <script src="https://cdn.flashtalking.com/frameworks/js/api/2/10/html5API.js"></script>
        <script src="https://cdn.flashtalking.com/frameworks/js/gsap/3.1.1/gsap.min.js"></script>
        <script src="https://cdn.flashtalking.com/frameworks/js/gsap/3.1.1/EasePack.min.js"></script>
        <script src="js/main.js"></script>
      </div>
    </body>  
</html>
