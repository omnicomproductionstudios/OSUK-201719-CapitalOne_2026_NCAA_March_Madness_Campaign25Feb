<!doctype html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
  </head>
  <body>
    <div id="banner">
      <!-- <img src="images/f1.jpg" style="position: absolute; left: 0px; top: 0px; z-index: 111; width: 728px; height: 90px; opacity: .5;" alt=""> -->
      <!-- content -->
      <ft-default clickaction="expand">
        <div class="defaultBorder defaultSize"></div>
        <div class="capOneLogo">
          <img src="images/redSwoop.svg" id="redSwoop" alt="" />
          <img src="images/capital.svg" id="capital" alt="Capital" />
          <img src="images/one.svg" id="one" alt="One" />
        </div>

        <div id="txt1Cont">
          <img
            src="images/txt1a.svg"
            id="txt1a"
            alt="No fees or minimums on checking accounts"
          />
        </div>

        <div class="ballCont">
          <img src="images/Chuck.png" id="ball" alt="Bouncing basketall" />
          <img src="images/Box.png" id="ballShadow" alt="basketall Shadow" />
        </div>

        <img
          src="images/rArrow.svg"
          id="rArrow"
          alt="Blue arrow pointing right"
        />

        <img
          class="expandBtn"
          src="images/expand_close_btn.svg"
          alt="click to expand"
        />
      </ft-default>

      <ft-expand customclose>
        <!-- <img src="images/f2.jpg" style="position: absolute; left: 0px; top: 0px; z-index: 111; width: 728px; height: 250px; opacity: .5;" alt=""> -->

        <div class="expCapOneLogo">
          <img src="images/redSwoop.svg" id="expRedSwoop" alt="" />
          <img src="images/capital.svg" id="expCapital" alt="Capital One" />
          <img src="images/one.svg" id="expOne" alt="" />
        </div>


        

        <div id="frame2">
          <img src="images/txt2a.svg" id="txt2a" alt="The bank is open!" />

          <img
            src="images/rArrow.svg"
            id="exprArrow"
            alt="Blue arrow pointing right"
          />
        </div>

        <div class="ncaaLockupCont">              
          <img src="images/proudPartnerOf.svg" id="proudPartnerOf" alt="Proud Partner of">
        </div>
        <div class="ballContExp">
          <img src="images/Chuck.png" id="ball2" alt="Bouncing basketall" />
          <img
            src="images/Box.png"
            id="ball2Shadow"
            alt="basketall Shadow"
          />
        </div>
        <div class="clickthrough expandSize" clicktag="1"></div>
        <div class="videoCont">
          <ft-video id="video1" name="video1"></ft-video>
          <ft-video-controls
            class="vidControls"
            for="video1"
          ></ft-video-controls>
          <img id="vidPoster" src="images/poster.jpeg" alt="" />
        </div>
        <ft-click id="close" clickaction="contract">
          <p>
            <img
              class="closeBtn"
              src="images/expand_close_btn.svg"
              alt="click to expand"
            />
          </p>
        </ft-click>
        <div class="defaultBorder expandSize"></div>
      </ft-expand>
      <div id="cover" class="defaultSize"></div>
      <!-- scripts -->
      <script src="https://cdn.flashtalking.com/frameworks/js/api/2/10/html5API.js"></script>
      <script src="https://cdn.flashtalking.com/frameworks/js/gsap/3.11.5/gsap.min.js"></script>
      <script src="https://cdn.flashtalking.com/frameworks/js/gsap/3.11.5/EasePack.min.js"></script>

      <script src="js/main.js"></script>
    </div>
  </body>
</html>
